---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: devops-portfolio
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://backend-service:5000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        location /health {
            proxy_pass http://backend-service:5000/health;
        }
    }
  index.html: |
    <!DOCTYPE html>
    <html lang="es">
    <head>
      <meta charset="UTF-8">
      <title>Notes App - Kubernetes TP09</title>
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #222; padding: 2rem; }
        h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 1.5rem; }
        .form { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
        input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        input[name=title] { flex: 1; min-width: 200px; }
        button { padding: 8px 16px; background: #1D9E75; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { background: #0F6E56; }
        .note { background: #fff; border: 1px solid #e0e0d8; border-radius: 8px; padding: 1rem; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: start; }
        .note-body h3 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .note-body p { font-size: 13px; color: #666; }
        .del { background: none; border: none; color: #A32D2D; cursor: pointer; font-size: 18px; padding: 0; }
        .status { font-size: 12px; color: #666; margin-bottom: 1rem; }
      </style>
    </head>
    <body>
      <h1>Notas - DevOps Portfolio</h1>
      <p class="status" id="status">Cargando...</p>
      <div class="form">
        <input name="title" id="title" placeholder="Titulo de la nota" />
        <input name="content" id="content" placeholder="Contenido opcional" />
        <button onclick="addNote()">Agregar</button>
      </div>
      <div id="notes"></div>
      <script>
        const API = "/api";
        async function load() {
          const r = await fetch(API + "/notes");
          const notes = await r.json();
          document.getElementById("notes").innerHTML = notes.map(n => `
            <div class="note">
              <div class="note-body">
                <h3>${n.title}</h3>
                <p>${n.content || ""} <small style="color:#aaa">${n.created_at.slice(0,16)}</small></p>
              </div>
              <button class="del" onclick="del(${n.id})">x</button>
            </div>`).join("");
          checkHealth();
        }
        async function addNote() {
          const title = document.getElementById("title").value.trim();
          if (!title) return;
          await fetch(API + "/notes", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ title, content: document.getElementById("content").value })
          });
          document.getElementById("title").value = "";
          document.getElementById("content").value = "";
          load();
        }
        async function del(id) {
          await fetch(API + "/notes/" + id, { method: "DELETE" });
          load();
        }
        async function checkHealth() {
          const r = await fetch("/health");
          const d = await r.json();
          document.getElementById("status").textContent = `Backend: ${d.status} | DB: ${d.db} | ${d.time}`;
        }
        load();
      </script>
    </body>
    </html>
